<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>화조사 미니또</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- 메인 -->
<div id="home" class="page active">

    <div class="left-box">
        <div class="title-tag">2027 이기적</div>
        <div class="main-title">화조사<br>미니또</div>

        <div class="status-box">
            <div class="status-title">STATUS</div>

            <div class="status-item">
                🔷 학습 진도율 🔷
                <div id="progressRate">00.00%</div>
            </div>

            <div class="status-item">
                🔥 누적 학습일 🔥
                <div id="studyDays">00일</div>
            </div>

            <div class="status-item">
                ⭐ 미니또 포인트 ⭐
                <div id="miniPoints">0000p</div>
            </div>
        </div>
    </div>

    <div class="right-box">

        <!-- 오늘의 개념 -->
        <div class="concept-box">
            <div class="concept-title">오늘의 개념 한 줄</div>
            <div id="todayConcept" class="concept-text">개념 한 줄 데이터</div>
        </div>

        <!-- 메뉴 -->
        <div class="menu-box">
            <div class="menu-btn" onclick="goPage('quizMenu')">퀴즈</div>
            <div class="menu-btn" onclick="goPage('reviewPage')">복습</div>
        </div>

        <!-- 서비스 -->
        <div class="service-wrapper">
            <div class="service-title">이기적인 독자서비스 바로가기</div>

            <div class="service-grid">

                <div class="service-link" onclick="openLink('https://license.youngjin.com/artyboard/mboard.asp?strBoardID=Errata_l&intPage=1')">2027년판 정오표</div>
                <div class="service-link" onclick="openLink('https://license.youngjin.com/artyboard/Mboard.asp?Action=view&strBoardID=notice&intSeq=130825')">정오표 이벤트</div>
                <div class="service-link" onclick="openLink('https://license.youngjin.com/')">수험서 커뮤니티</div>

                <div class="service-link" onclick="openLink('https://cafe.naver.com/f-e/cafes/19039057/menus/384?viewType=I')">또기적 학습자료집</div>
                <div class="service-link" onclick="openLink('https://cafe.naver.com/f-e/cafes/19039057/menus/349')">1:1 독자문의</div>
                <div class="service-link" onclick="openLink('https://cafe.naver.com/yjbooks')">스터디 카페</div>

                <div class="service-link" onclick="openLink('https://youtube.com/playlist?list=PL6i7rGeEmTvrn8f0iwt7Ki9INiog4Dmfs')">무료 동영상 강의</div>
                <div class="service-link" onclick="openLink('https://youtube.com/@ydot0789')">이기적 유튜브 채널</div>
                <div class="service-link" onclick="openLink('https://license.youngjin.com/artyboard/mboard.asp?Action=view&strBoardID=event&intSeq=115423')">기출 복원 이벤트</div>

                <div class="service-link" onclick="openLink('https://shop.youngjin.com/goods/view?no=1184')">도서 구매하기</div>
                <div class="service-link" onclick="openLink('https://license.korcham.net/co/examguide.do?mm=34&cd=0202')">시행처 바로가기</div>
                <div class="service-link" onclick="openLink('https://cafe.naver.com/yjbooks/47482')">감수자 & 베타테스터</div>

            </div>
        </div>

    </div>
</div>

<!-- 퀴즈 메뉴 -->
<div id="quizMenu" class="page">
    <div class="page-title">퀴즈 유형 선택</div>

    <div class="quiz-select" onclick="startQuiz('ox')">OX 퀴즈</div>
    <div class="quiz-select" onclick="startQuiz('blank')">빈칸 퀴즈</div>
    <div class="quiz-select" onclick="startQuiz('multi')">객관식 퀴즈</div>
    <div class="quiz-select" onclick="startQuiz('connect')">연결 퀴즈</div>

    <button class="back-btn" onclick="goPage('home')">← 돌아가기</button>
</div>

<!-- OX 퀴즈 -->
<div id="oxQuiz" class="page">
    <div class="quiz-num" id="oxNumber">01</div>
    <div class="quiz-question" id="oxQuestion"></div>

    <div class="quiz-btn-box">
        <button class="ox-btn" onclick="selectOX('O')">O</button>
        <button class="ox-btn" onclick="selectOX('X')">X</button>
    </div>

    <img id="feedbackImage" class="feedback-img" src="" alt="">

    <div id="oxExplain" class="quiz-explain"></div>

    <div class="nav-box">
        <button onclick="prevQuiz()">이전</button>
        <button onclick="nextQuiz()">다음</button>
        <button onclick="goPage('home')">홈</button>
    </div>
</div>

<!-- 복습 카드 -->
<div id="reviewPage" class="page">
    <div class="page-title">복습 카드</div>

    <div id="reviewCard" class="review-card" onclick="flipCard()">
        <div class="card-face front" id="cardFront">문제</div>
        <div class="card-face back">
            <div id="cardBackAnswer"></div>
            <div id="cardBackExplain"></div>
        </div>
    </div>

    <div class="nav-box">
        <button onclick="prevReview()">이전</button>
        <button onclick="nextReview()">다음</button>
        <button onclick="goPage('home')">홈</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
